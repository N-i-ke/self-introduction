<!DOCTYPE html>
<html lang="ja">
  <head>

    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Viewport / Theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0b0b" />

    <!-- SEO -->
    <title>N-i-ke's Portfolio — Front-end Engineer</title>
    <meta
      name="description"
      content="N-i-ke のフロントエンドエンジニアポートフォリオ。React.js / Next.js / Vue.js / TypeScript を中心に EC サイト・LP・Web アプリケーション開発の実績、スキル、提供サービスを掲載しています。"
    />
    <meta name="author" content="N-i-ke" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://n-i-ke.github.io/self-introduction/" />
    <meta property="og:title" content="N-i-ke's Portfolio — Front-end Engineer" />
    <meta
      property="og:description"
      content="React.js / Next.js / Vue.js / TypeScript を中心に EC サイト・LP・Web アプリケーション開発を手掛けるフロントエンドエンジニアのポートフォリオ。"
    />
    <meta property="og:site_name" content="N-i-ke's Portfolio" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="N-i-ke's Portfolio — Front-end Engineer" />
    <meta
      name="twitter:description"
      content="React.js / Next.js / Vue.js / TypeScript を中心に EC サイト・LP・Web アプリケーション開発を手掛けるフロントエンドエンジニアのポートフォリオ。"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google tag (gtag.js)
         Measurement ID は .env.production の VITE_GA_MEASUREMENT_ID から
         Vite のビルド時 interpolation で埋め込まれる。
         dev サーバーでは値が空になるため実質的な計測は発生しない。 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_MEASUREMENT_ID%', { anonymize_ip: true });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
